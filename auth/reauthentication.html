<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm your identity — Divera</title>
  <link rel="icon" href="https://agatpmqbrpdhlfeinkmv.supabase.co/storage/v1/object/public/DiveraPhotos/divera-icon.png">
</head>
<body style="margin: 0; padding: 0; background-color: #050505; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #050505;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width: 420px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom: 28px;">
              <img src="https://agatpmqbrpdhlfeinkmv.supabase.co/storage/v1/object/public/DiveraPhotos/divera-icon.png" alt="Divera" width="120" style="display: block; border: 0;">
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color: #111113; border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); padding: 40px 32px; text-align: center;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">

                <!-- Heading -->
                <tr>
                  <td align="center" style="padding-bottom: 12px;">
                    <h1 style="margin: 0; color: #EBEBEB; font-size: 24px; font-weight: 600; letter-spacing: -0.3px; line-height: 1.3;">Confirm your identity</h1>
                  </td>
                </tr>

                <!-- Body text -->
                <tr>
                  <td align="center" style="padding-bottom: 20px;">
                    <p style="margin: 0; color: #7A7A7E; font-size: 15px; line-height: 1.6;">Enter the verification code below to proceed with this action on your Divera account.</p>
                  </td>
                </tr>

                <!-- Token box -->
                <tr>
                  <td style="padding-bottom: 20px;">
                    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #1A1A1C; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;">
                      <tr>
                        <td style="padding: 24px 20px; text-align: center;">
                          <p style="margin: 0 0 8px 0; color: #EBEBEB; font-size: 36px; font-weight: 700; letter-spacing: 10px; line-height: 1;">{{ .Token }}</p>
                          <p style="margin: 0; color: #7A7A7E; font-size: 13px;">This code expires in 10 minutes</p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <!-- Divider -->
                <tr>
                  <td style="border-top: 1px solid rgba(255,255,255,0.06); padding-top: 24px;">
                    <p style="margin: 0; color: #7A7A7E; font-size: 13px; line-height: 1.5; text-align: center;">If you didn't request this code, you can safely ignore this email.</p>
                  </td>
                </tr>

              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
