<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email address changed — Divera</title>
  <link rel="icon" href="https://agatpmqbrpdhlfeinkmv.supabase.co/storage/v1/object/public/DiveraPhotos/divera-icon.png">
</head>
<body style="margin: 0; padding: 0; background-color: #050505; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #050505;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width: 420px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom: 28px;">
              <img src="https://agatpmqbrpdhlfeinkmv.supabase.co/storage/v1/object/public/DiveraPhotos/divera-icon.png" alt="Divera" width="120" style="display: block; border: 0;">
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color: #111113; border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); padding: 40px 32px; text-align: center;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">

                <!-- Heading -->
                <tr>
                  <td align="center" style="padding-bottom: 12px;">
                    <h1 style="margin: 0; color: #EBEBEB; font-size: 24px; font-weight: 600; letter-spacing: -0.3px; line-height: 1.3;">Email address changed</h1>
                  </td>
                </tr>

                <!-- Body text -->
                <tr>
                  <td align="center" style="padding-bottom: 20px;">
                    <p style="margin: 0; color: #7A7A7E; font-size: 15px; line-height: 1.6;">The email address for your Divera account was successfully updated.</p>
                  </td>
                </tr>

                <!-- Alert box -->
                <tr>
                  <td style="padding-bottom: 28px;">
                    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: rgba(255,90,98,0.08); border: 1px solid rgba(255,90,98,0.2); border-radius: 10px;">
                      <tr>
                        <td style="padding: 16px 20px; text-align: center;">
                          <p style="margin: 0; color: #FF5A62; font-size: 14px; line-height: 1.5;">If you didn't make this change, your account may be compromised. Reset your password immediately.</p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <!-- Button -->
                <tr>
                  <td align="center" style="padding-bottom: 24px;">
                    <a href="https://divera.app/reset-password" style="display: inline-block; padding: 14px 28px; background-color: #FF5A62; color: #ffffff; font-size: 15px; font-weight: 600; text-decoration: none; border-radius: 12px;">Reset password</a>
                  </td>
                </tr>

                <!-- Divider -->
                <tr>
                  <td style="border-top: 1px solid rgba(255,255,255,0.06); padding-top: 24px;">
                    <p style="margin: 0; color: #7A7A7E; font-size: 13px; line-height: 1.5; text-align: center;">If you made this change yourself, no further action is needed.</p>
                  </td>
                </tr>

              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
